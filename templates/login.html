<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Belfry GTM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-1 text-gray-900">Belfry GTM</h1>
    <p class="text-center text-gray-500 text-sm mb-8">Operating Model Dashboard</p>
    <form method="post">
      {% if error %}
      <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2">{{ error }}</div>
      {% endif %}
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" autofocus
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4" />
      <button type="submit"
              class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700 transition">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
