<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied — Belfry GTM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Access Denied</h1>
    <p class="text-gray-500 text-sm mt-3 mb-8">{{ message }}</p>
    <a href="{{ url_for('login') }}"
       class="inline-block w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700 transition">
      Try Again
    </a>
  </div>
</body>
</html>
