{% extends "base.html" %}
{% block title %} — Loading{% endblock %}
{% block content %}
<meta http-equiv="refresh" content="5">
<div class="flex flex-col items-center justify-center py-32 gap-6">
  <div class="w-12 h-12 border-4 border-violet-200 border-t-violet-500 rounded-full animate-spin"></div>
  <div class="text-center">
    <p id="loading-msg" class="text-gray-700 font-medium text-lg" style="transition:opacity .35s ease">Warming up the data…</p>
    <p class="text-gray-400 text-sm mt-1">This page will refresh automatically in a few seconds.</p>
  </div>
</div>
<script>
(function(){
  var msgs = [
    "Warming up the data…",
    "Asking HubSpot nicely…",
    "Crunching the numbers…",
    "Running the pipeline math…",
    "Calculating who's crushing it…",
    "Fetching, wrangling, and reformatting…",
    "Almost there…",
    "Making the magic happen…",
    "This only happens on first load, promise…",
    "Good things take a moment…"
  ];
  var el = document.getElementById('loading-msg');
  var i = 0;
  setInterval(function(){
    el.style.opacity = '0';
    setTimeout(function(){
      i = (i + 1) % msgs.length;
      el.textContent = msgs[i];
      el.style.opacity = '1';
    }, 350);
  }, 2800);
})();
</script>
{% endblock %}
